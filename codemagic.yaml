workflows:
  ios-release:
    name: Yedem iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Yedem_ASC_Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ru.eda_yedem.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "ru.eda_yedem.app"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((LATEST + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Tester
